<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="cursor-glow" id="cursor-glow"></div>
    <div class="floating-controls">
        <div class="fab-group" id="fabGroup">
            <button class="fab-btn main-fab" onclick="toggleMainFab()" aria-label="Menu">☰</button>
            <div class="fab-options">
                <button class="fab-btn settings-fab tooltip" onclick="toggleSettings()" aria-label="Toggle Settings"><span class="tooltip-text"></span>⚙</button>

                <div class="size-fab-container">
                    <button class="fab-btn size-fab tooltip" onclick="toggleSizeMenu()" aria-label="Adjust Size"><span class="tooltip-text"></span>⤢</button>
                    <div class="size-menu" id="sizeMenu">
                        <button class="size-opt" onclick="setSize('small')">Small</button>
                        <button class="size-opt active" onclick="setSize('medium')">Medium</button>
                        <button class="size-opt" onclick="setSize('large')">Large</button>
                        <button class="size-opt" id="customSizeOpt" onclick="toggleCustomSize()">Custom</button>
                    </div>

                    <!-- Custom Size Panel -->
                    <div class="custom-size-panel" id="customSizePanel">
                        <div class="custom-theme-header">
                            <span>Ukuran Custom</span>
                            <button onclick="toggleCustomSize()">×</button>
                        </div>
                        <div class="custom-theme-body">
                            <div class="color-row">
                                <label>Lebar</label>
                                <input type="range" id="size-width" min="300" max="1000" value="500"
                                    oninput="applyCustomSize()">
                            </div>
                            <div class="color-row">
                                <label>Skala</label>
                                <input type="range" id="size-scale" min="0.5" max="3" step="0.05" value="1"
                                    oninput="applyCustomSize()">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="theme-fab-container">
                    <button class="fab-btn theme-fab tooltip" onclick="toggleThemeMenu()" aria-label="Switch Theme"><span class="tooltip-text"></span>◐</button>
                    <div class="theme-menu" id="themeMenu">
                        <button class="theme-opt active" onclick="setTheme('dark')">Dark</button>
                        <button class="theme-opt" onclick="setTheme('light')">Light</button>
                        <button class="theme-opt" onclick="setTheme('neon')">Neon</button>
                        <button class="theme-opt" onclick="setTheme('sunset')">Sunset</button>
                        <button class="theme-opt" onclick="setTheme('cyberpunk')">Cyber</button>
                        <button class="theme-opt" onclick="setTheme('forest')">Forest</button>
                        <button class="theme-opt" onclick="setTheme('ocean')">Ocean</button>
                        <button class="theme-opt" id="customThemeOpt" onclick="setTheme('custom')">Custom</button>
                    </div>

                    <!-- Custom Theme Editor -->
                    <div class="custom-theme-panel" id="customThemePanel">
                        <div class="custom-theme-header">
                            <span>Editor Warna</span>
                            <button onclick="toggleCustomEditor()">×</button>
                        </div>
                        <div class="custom-theme-body">
                            <div class="color-row"><label>Background</label><input type="color" id="color-bg"
                                    oninput="applyCustomTheme()"></div>
                            <div class="color-row"><label>Surface</label><input type="color" id="color-surface"
                                    oninput="applyCustomTheme()"></div>
                            <div class="color-row"><label>Text</label><input type="color" id="color-text"
                                    oninput="applyCustomTheme()"></div>
                            <div class="color-row"><label>Accent</label><input type="color" id="color-accent"
                                    oninput="applyCustomTheme()"></div>
                            <button class="save-theme-btn" onclick="saveCustomTheme()">Save Theme</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="settings-panel" class="hidden">
            <div class="setting-item">
                <span class="setting-label">Show Date</span>
                <div id="toggle-date-btn" class="switch active">
                    <div class="dot"></div>
                </div>
            </div>

            <div class="setting-item">
                <span class="setting-label">24H Format</span>
                <div id="toggle-24h-btn" class="switch active">
                    <div class="dot"></div>
                </div>
            </div>

            <div class="setting-group">
                <span class="setting-label">Precision</span>
                <div class="segmented-control" id="precision-group">
                    <button class="segment" data-value="h">H</button>
                    <button class="segment" data-value="hm">M</button>
                    <button class="segment active" data-value="hms">S</button>
                </div>
            </div>

            <div class="setting-group">
                <span class="setting-label">Theme</span>
                <div class="segmented-control" id="theme-group">
                    <button class="segment theme-segment active" data-theme="dark">Dark</button>
                    <button class="segment theme-segment" data-theme="light">Light</button>
                    <button class="segment theme-segment" data-theme="neon">Neon</button>
                </div>
            </div>
        </div>
    </div>
    <div class="clock-wrapper">
        <div id="time">00:00:00</div>
        <div id="date">WEDNESDAY, FEBRUARY 04, 2026</div>
    </div>


    <script src="js/script.js"></script>
</body>

</html>
