<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cursor-glow" id="cursor-glow"></div>
    
    <div class="app-container">
        <header>
            <div class="brand">quote.<em>gen</em></div>
        </header>

        <main class="quote-area">
            <div class="quote-card">
                <div class="quote-mark">“</div>
                <p id="quote-text">Satu langkah kecil hari ini adalah awal dari perjalanan besar hari esok.</p>
                <div class="author" id="quote-author">— Anonim</div>
                
                <div class="actions">
                    <button id="copy-btn" class="icon-btn" title="Salin">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                    <button id="new-quote-btn" class="primary-btn">Generate</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
