<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stress Reliever</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cursor-glow" id="cursor-glow"></div>
    
    <div class="app-container">
        <header>
            <div class="brand">stress.<em>reliever</em></div>
            <div class="stats">
                <span class="label">Stress Diredakan</span>
                <h1 id="stress-count">0</h1>
            </div>
        </header>

        <main class="button-area">
            <div class="button-wrapper">
                <button id="stress-btn" class="stress-btn">
                    <span class="btn-text">PRESS</span>
                    <div class="btn-glow"></div>
                </button>
            </div>
            <p class="hint">Tekan terus untuk melepaskan beban.</p>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
