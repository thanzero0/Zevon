<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="cursor-glow" id="cursor-glow"></div>
    
    <div class="floating-controls">
        <div class="fab-group" id="fabGroup">
            <button class="fab-btn main-fab" onclick="toggleMainFab()" aria-label="Menu">☰</button>
            <div class="fab-options">
                <div class="size-fab-container">
                    <button class="fab-btn size-fab tooltip" onclick="toggleSizeMenu()" aria-label="Adjust Size"><span class="tooltip-text">Ukuran</span>⤢</button>
                    <div class="size-menu" id="sizeMenu">
                        <button class="size-opt" onclick="setSize('mini')">Mini</button>
                        <button class="size-opt active" onclick="setSize('medium')">Medium</button>
                        <button class="size-opt" onclick="setSize('large')">Large</button>
                        <button class="size-opt" onclick="setSize('desktop')">Desktop</button>
                        <button class="size-opt" id="customSizeOpt" onclick="toggleCustomSize()">Custom</button>
                    </div>

                    <div class="custom-size-panel" id="customSizePanel">
                        <div class="custom-theme-header">
                            <span>Ukuran Custom</span>
                            <button onclick="toggleCustomSize()">×</button>
                        </div>
                        <div class="custom-theme-body">
                            <div class="color-row">
                                <label>Lebar</label>
                                <input type="range" id="size-width" min="400" max="1200" value="1000" oninput="applyCustomSize()">
                            </div>
                            <div class="color-row">
                                <label>Skala</label>
                                <input type="range" id="size-scale" min="0.5" max="1.5" step="0.05" value="1" oninput="applyCustomSize()">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="theme-fab-container">
                    <button class="fab-btn theme-fab tooltip" onclick="toggleThemeMenu()" aria-label="Switch Theme"><span class="tooltip-text">Tema</span>◐</button>
                    <div class="theme-menu" id="themeMenu">
                        <button class="theme-opt active" onclick="setTheme('dark')">Dark</button>
                        <button class="theme-opt" onclick="setTheme('light')">Light</button>
                        <button class="theme-opt" onclick="setTheme('neon')">Neon</button>
                        <button class="theme-opt" onclick="setTheme('sunset')">Sunset</button>
                        <button class="theme-opt" onclick="setTheme('cyberpunk')">Cyber</button>
                        <button class="theme-opt" onclick="setTheme('forest')">Forest</button>
                        <button class="theme-opt" onclick="setTheme('ocean')">Ocean</button>
                        <button class="theme-opt" id="customThemeOpt" onclick="setTheme('custom')">Custom</button>
                    </div>

                    <div class="custom-theme-panel" id="customThemePanel">
                        <div class="custom-theme-header">
                            <span>Editor Warna</span>
                            <button onclick="toggleCustomEditor()">×</button>
                        </div>
                        <div class="custom-theme-body">
                            <div class="color-row"><label>Background</label><input type="color" id="color-bg" oninput="applyCustomTheme()"></div>
                            <div class="color-row"><label>Surface</label><input type="color" id="color-surface" oninput="applyCustomTheme()"></div>
                            <div class="color-row"><label>Primary</label><input type="color" id="color-primary" oninput="applyCustomTheme()"></div>
                            <div class="color-row"><label>Text</label><input type="color" id="color-text" oninput="applyCustomTheme()"></div>
                            <button class="save-theme-btn" onclick="saveCustomTheme()">Save Theme</button>
                        </div>
                    </div>
                </div>
                
                <div class="action-fab-container">
                    <button class="fab-btn tooltip" onclick="openManageCategories()" aria-label="Edit Kategori"><span class="tooltip-text">Kategori</span>✎</button>
                </div>
                <div class="action-fab-container">
                    <button class="fab-btn tooltip" onclick="exportToExcel()" aria-label="Export Excel"><span class="tooltip-text">Export</span>⤓</button>
                </div>
                <div class="action-fab-container">
                    <button class="fab-btn tooltip" onclick="confirmResetHistory()" aria-label="Reset Riwayat"><span class="tooltip-text">Reset Riwayat</span>⟲</button>
                </div>
                <div class="action-fab-container">
                    <button class="fab-btn tooltip" onclick="confirmResetBudget()" aria-label="Reset Budget"><span class="tooltip-text">Reset Budget</span>🗑</button>
                </div>
            </div>
        </div>
    </div>

    <div class="app-container" id="app-container">
        <header>
            <div class="brand">budget.<em>planner</em></div>
            <div class="total-summary">
                <span class="label">Total Saldo</span>
                <h1 id="remaining-balance">Rp 0</h1>
            </div>
        </header>

        <main class="planner-grid">
            <!-- Income Form -->
            <section class="card income-form">
                <div class="card-header income-header">Tambah Pendapatan</div>
                <div class="form-body">
                    <input type="text" id="income-name" placeholder="Nama pendapatan..." autocomplete="off">
                    <input type="text" id="income-desc" placeholder="Deskripsi pendapatan..." autocomplete="off">
                    <select id="income-type" class="item-select"></select>
                    <div class="input-row">
                        <div class="input-group">
                            <input type="number" id="income-amount" placeholder="Jumlah" autocomplete="off">
                            <span class="currency-tag">Rp</span>
                        </div>
                        <button id="add-income-btn" class="add-btn btn-income">+</button>
                    </div>
                </div>
            </section>

            <!-- Expense Form -->
            <section class="card expense-form">
                <div class="card-header expense-header">Tambah Pengeluaran</div>
                <div class="form-body">
                    <input type="text" id="expense-name" placeholder="Nama pengeluaran..." autocomplete="off">
                    <input type="text" id="expense-desc" placeholder="Deskripsi pengeluaran..." autocomplete="off">
                    <select id="expense-type" class="item-select"></select>
                    <div class="input-row">
                        <div class="input-group">
                            <input type="number" id="expense-amount" placeholder="Jumlah" autocomplete="off">
                            <span class="currency-tag">Rp</span>
                        </div>
                        <button id="add-expense-btn" class="add-btn btn-expense">+</button>
                    </div>
                </div>
            </section>

            <!-- History Section -->
            <section class="card history-section">
                <div class="card-header">
                    <span>Riwayat Transaksi</span>
                </div>
                <div class="list-container" id="transaction-list">
                    <div class="empty-state">Belum ada data transaksi.</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Custom Modal Popup -->
    <div class="modal-overlay" id="app-modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title">Title</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Content -->
            </div>
            <div class="modal-footer" id="modal-footer">
                <!-- Buttons -->
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
