<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cursor-glow" id="cursor-glow"></div>
    
    <div class="app-container">
        <header>
            <div class="brand">goal.<em>tracker</em></div>
            <button id="add-goal-btn" class="primary-btn">+ Tambah Goal</button>
        </header>

        <main class="goals-grid" id="goals-grid">
            <!-- Goals will be injected here -->
        </main>

        <div class="modal-overlay" id="modal-overlay">
            <div class="modal">
                <h2>Buat Goal Baru</h2>
                <div class="form-group">
                    <label>Nama Goal</label>
                    <input type="text" id="goal-name" placeholder="Misal: Nabung Beli Motor" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Target (Angka)</label>
                    <input type="number" id="goal-target" placeholder="1000000" autocomplete="off">
                </div>
                <div class="modal-actions">
                    <button id="modal-cancel" class="text-btn">Batal</button>
                    <button id="modal-save" class="primary-btn">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
